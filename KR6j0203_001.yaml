body:
  text: 不空三藏譯真言如經修行此出生無邊門總持轉目三種業依三祕密門所謂三金剛身印語真言心住三摩地由入三平等善住瑜伽故自身同本尊在凡成正覺斯法最深祕大日經王説一生補處等尚非其境界況餘劣慧人如獲輪王珠祕持不妄説是尊即羯摩波羅蜜菩薩由住出生故示少年女形顯明大慈母諸佛住是智能普現色身處大菩提心跏趺蓮臺上大印威儀等同不空成就如來之相狀定羽金剛拳當心持蓮華置般若梵夾慧羽説法相揚掌申五輪忍峯現羯磨十字金剛輪首冠五如來遍身草緑色復於身支分安布八字門跛字住於心攞字成毫相嚩字置舌端惹字置於頭碧色成頂相迦字置慧掌緣色成羯摩十二緣行輪馱黃置定掌成華般若夾奢字安觀足乞叉置止足五字皆皓素如雪乳鵝月是字成輪相三摩耶密印加持頂印是初後次第法同諸部儀軌八十俱胝佛圍繞是尊住復有八菩薩安住於八方及以八藥叉四攝八供養次第而布列成祕曼荼羅誦持真言經所成如本教修行諸儀則結集決擇竟勝義無相隨形好故是則法身愚夫法聖人法無二無生無滅非業異熟陀羅尼法要空無相無願隨入法界非奢摩他毗鉢舍那一切法隨入真如一切法剎那無盡無壞無身本寂故隨入一切法涅槃元祿十六年正月二十九日以淨嚴上人之本再校了尊教
